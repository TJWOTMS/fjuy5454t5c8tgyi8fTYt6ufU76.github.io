<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>tris.rocks — Coming Soon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0b0b;
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, 'Roboto Mono', 'Courier New', monospace;
            text-align: center;
            color: #d9d2ff;
        }

        h1 {
            font-size: 56px;
            margin: 0;
            letter-spacing: 2px;
        }

        .tris { color: #7600f4; }
        .rocks { color: #ffffff; }

        p {
            max-width: 520px;
            margin: 18px auto 30px;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .buttons {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .button {
            padding: 12px 18px;
            border: 1px solid rgba(118,0,244,0.7);
            background: rgba(118,0,244,0.2);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
            transition: transform 160ms ease, background 160ms ease;
        }

        .button:hover {
            background: rgba(118,0,244,0.35);
            transform: translateY(-2px);
        }

        @media (max-width: 520px) {
            h1 { font-size: 44px; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div>
        <h1>
            <span class="tris">tris</span><span class="rocks">.rocks</span>
        </h1>
        <p>
            <strong>tris.rocks</strong> is currently in closed testing.
            <br>
            join our discord to stay updated.
        </p>

        <div class="buttons">
            <a class="button" href="https://discord.gg/QwDRmQGXhZ" target="_blank" rel="noopener">discord</a>
            <a class="button" href="https://youtube.com/YOUR_CHANNEL" target="_blank" rel="noopener">youtube</a>
        </div>
    </div>

</body>
</html>
