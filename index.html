<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>tris.rocks — Coming Soon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --footer-height: 72px; }
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #0b0b0b;
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, 'Roboto Mono', 'Courier New', monospace;
            text-transform: lowercase;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 56px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            position: relative;
            white-space: nowrap;
        }

        .tris { color: #7600f4; }
        .rocks { color: white; }

        .tris {
            color: #7600f4;
            text-shadow: 0 0 10px rgba(118,0,244,0.65), 0 0 24px rgba(118,0,244,0.18);
            transition: text-shadow 220ms ease, transform 180ms ease;
            will-change: text-shadow, transform;
            animation: trisGlow 2400ms ease-in-out infinite alternate;
        }
        @keyframes trisGlow {
            0% {
                text-shadow: 0 0 8px rgba(118,0,244,0.55), 0 0 20px rgba(118,0,244,0.14);
            }
            50% {
                text-shadow: 0 0 20px rgba(118,0,244,0.95), 0 0 44px rgba(118,0,244,0.28);
            }
            100% {
                text-shadow: 0 0 14px rgba(118,0,244,0.75), 0 0 32px rgba(118,0,244,0.22);
            }
        }
        .tris:hover {
            text-shadow: 0 0 22px rgba(118,0,244,0.98), 0 0 48px rgba(118,0,244,0.38);
            transform: translateZ(0);
            cursor: default;
        }

        .bar {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #7600f4;
            margin-left: 0;
            vertical-align: text-bottom;
            opacity: 1;
            box-shadow: 0 0 10px rgba(118,0,244,0.75), 0 0 24px rgba(118,0,244,0.18), 0 0 0 4px rgba(118,0,244,0.08);
            transition: box-shadow 220ms ease, transform 180ms ease;
            will-change: box-shadow, transform;
        }

        @keyframes blink {
            0%, 49.999% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .bar.blink {
            animation: blink 2s steps(2, start) infinite;
        }

        .subtitle {
            margin-top: 12px;
            color: #bfbfbf;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            opacity: 0;
            transform: translateY(6px);
            animation: subtitleIn 600ms cubic-bezier(.2,.9,.2,1) forwards;
            min-width: 0;
            width: auto;
        }

        @keyframes subtitleIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .notice {
            margin-top: 24px;
            max-width: 520px;
            text-align: center;
            color: #d9d2ff;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .notice strong {
            color: #fff;
        }

        .fixed-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            padding: 18px 20px;
            box-sizing: border-box;
            border-top: 1px solid #7600f4;
            background: rgba(0,0,0,0.0);
            z-index: 1000;
            height: var(--footer-height);
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .icon-button {
            color: #7600f4;
            font-size: 1.8rem;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }

        .icon-button:hover {
            opacity: 1;
            transform: scale(1.15);
        }

        .fixed-footer .bottom-buttons {
            display: flex;
            gap: 35px;
            align-items: center;
        }

        @media (max-width: 700px) {
            body { overflow: auto; height: 100vh; }
            .fixed-footer { padding: 12px 16px; --footer-height: 60px; }
            :root { --footer-height: 60px; }
            h1 { font-size: 48px; }
            .notice { font-size: 1rem; padding: 0 12px; }
        }
    </style>
</head>
<body>

    <div class="section hero visible" id="hero">
        <h1 id="typeText">
            <span id="text"></span><span class="bar"></span>
            <div id="subtitle" class="subtitle" aria-hidden="false">
                <span>coming soon</span>
            </div>
        </h1>

        <div class="notice">
            <p><strong>tris.rocks</strong> is still under development and isn't released yet.</p>
            <p>We're working on the best launch experience — check back soon or join the Discord for updates.</p>
        </div>
    </div>

    <div class="fixed-footer" aria-hidden="false">
        <div class="bottom-buttons">
            <a href="https://discord.gg/QwDRmQGXhZ" target="_blank" class="icon-button" aria-label="Discord">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="https://youtube.com/YOUR_CHANNEL" target="_blank" class="icon-button" aria-label="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>
    </div>

    <canvas id="bg-dots" aria-hidden="true"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('bg-dots');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            let DPR = window.devicePixelRatio || 1;
            let w = 0, h = 0;

            function resize() {
                DPR = window.devicePixelRatio || 1;
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                canvas.width = Math.floor(w * DPR);
                canvas.height = Math.floor(h * DPR);
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
                buildGrid();
            }

            let dots = [];
            function buildGrid() {
                dots = [];
                const spacing = Math.max(36, Math.round(Math.min(w, h) / 22));
                for (let y = spacing/2; y < h; y += spacing) {
                    for (let x = spacing/2; x < w; x += spacing) {
                        dots.push({ x, y, base: 1.1 + Math.random() * 0.8, max: 6 + Math.random()*6 });
                    }
                }
            }

            const pointer = { x: -9999, y: -9999, last: 0 };
            function onMove(e) {
                const p = e.touches ? e.touches[0] : e;
                pointer.x = p.clientX;
                pointer.y = p.clientY;
                pointer.last = Date.now();
            }
            window.addEventListener('mousemove', onMove, { passive: true });
            window.addEventListener('touchmove', onMove, { passive: true });

            let raf = null;
            function render() {
                ctx.clearRect(0,0,w,h);
                const time = Date.now();
                const decay = Math.max(0, 1 - ((time - pointer.last) / 1200));

                for (let i = 0; i < dots.length; i++) {
                    const d = dots[i];
                    const dx = d.x - pointer.x;
                    const dy = d.y - pointer.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    const influenceRadius = 220;
                    const inf = Math.max(0, 1 - (dist / influenceRadius));
                    const effective = inf * decay;

                    const boost = 1;
                    const r = d.base + effective * (d.max - d.base) * boost;
                    const alpha = 0.06 + effective * 0.6 * boost;

                    const pulse = 1 + 0.12 * Math.sin((i + time*0.002) );
                    const size = Math.max(1, Math.round((r * pulse) * 2));
                    ctx.fillStyle = `rgba(118,0,244,${alpha.toFixed(3)})`;
                    ctx.fillRect(Math.round(d.x - size/2), Math.round(d.y - size/2), size, size);
                }

                raf = requestAnimationFrame(render);
            }

            resize();
            window.addEventListener('resize', resize);
            raf = requestAnimationFrame(render);
        })();

        const text = "tris.rocks";
        const speed = 120;

        const output = document.getElementById("text");
        let i = 0;

        function type() {
            if (i < text.length) {
                const c = text[i];

                if (i < 4) {
                    output.innerHTML += `<span class="tris">${c}</span>`;
                } else {
                    output.innerHTML += `<span class="rocks">${c}</span>`;
                }

                i++;
                setTimeout(type, speed);
            } else {
                const bar = document.querySelector('.bar');
                if (bar) bar.classList.add('blink');
            }
        }

        type();
    </script>
</body>
</html>
